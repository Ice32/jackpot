spring:
  application:
    name: jackpot-service
  datasource:
    url: jdbc:h2:mem:jackpotdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true # this would be false in an actual production deployment
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true # Ensures schema is ready before data.sql runs
logging:
  level:
    com:
      sporty: DEBUG
    org:
      apache:
        kafka: WARN
    kafka: WARN
    state: WARN
