spring:
  application:
    name: jackpot-service
  datasource:
    url: jdbc:h2:mem:jackpotdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true # Let's enable the console so you can inspect data
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true # Ensures schema is ready before data.sql runs
logging:
  level:
    org:
      apache:
        kafka: WARN
    kafka: WARN
    state: WARN
jackpot:
  strategies:
    contribution:
      fixed:
        contribution-rate: 0.05
      variable:
        initial-rate: 0.1   # Starts at 5% contribution
        decay-step: 1000.00  # Bins calculated per $1,000 increments
        decay-rate: 0.005    # Drops by 0.5% per bin
        floor-rate: 0.01     # Levels off permanently at 1% minimum
    reward:
      fixed:
        win-chance: 0.5           # Flat 0.5% chance to win on any bet
      variable:
        base-chance: 5
        tier1-threshold: 5000.00
        tier1-chance: 10
        tier2-threshold: 10000.00
        tier2-chance: 20
        pool-limit: 25000.00
