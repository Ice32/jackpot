<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackpot Live Demo</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 20px 10px;
            background: #121212;
            color: white;
            margin: 0;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 20px;
        }
        .user-config {
            max-width: 400px;
            margin: 0 auto 15px auto;
            text-align: left;
            box-sizing: border-box;
        }
        .user-config label {
            font-size: 0.8rem;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .user-config input, .user-config select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .user-config input:focus, .user-config select:focus {
            border-color: #4cdf87;
        }
        .box {
            border: 2px dashed #444;
            padding: 30px 20px;
            max-width: 400px;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn {
            background: #4cdf87;
            color: #121212;
            border: none;
            padding: 15px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(76, 223, 135, 0.3);
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.98);
            background: #3cbe71;
        }
        .win { color: #4cdf87; font-weight: bold; font-size: 1.4rem; }
        .lose { color: #ff5252; font-size: 1.2rem; }
        .stats { color: #bbb; font-size: 0.9rem; margin-top: 10px; line-height: 1.4; }

        .rewards-container {
            max-width: 400px;
            margin: 30px auto 0 auto;
            text-align: left;
            box-sizing: border-box;
        }
        .rewards-container h3 {
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            margin-bottom: 10px;
            color: #4cdf87;
            font-size: 1.1rem;
        }
        .rewards-list {
            max-height: 200px;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
            border: 1px solid #222;
            border-radius: 6px;
            background: #1a1a1a;
        }
        .reward-item {
            padding: 10px 12px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reward-item:last-child {
            border-bottom: none;
        }
        .reward-meta {
            color: #aaa;
        }
        .reward-amount {
            color: #4cdf87;
            font-weight: bold;
        }
        .no-rewards {
            padding: 15px;
            color: #666;
            text-align: center;
            font-size: 0.85rem;
        }
        .badge {
            background: #333;
            color: #ffb74d;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<h1>🏆 Sporty Jackpot Demo</h1>
<p>Select a pool, configure your name, and use the button or **SPACEBAR**.</p>

<!-- Dynamic Selection Configuration Block -->
<div class="user-config" style="margin-bottom: 10px;">
    <label for="jackpotSelect">🎯 TARGET JACKPOT POOL</label>
    <select id="jackpotSelect">
        <option value="">Loading available pools...</option>
    </select>
</div>

<div class="user-config">
    <label for="usernameInput">👤 PLAYER NAME (OPTIONAL)</label>
    <input type="text" id="usernameInput" placeholder="Enter your name..." maxlength="30">
</div>

<div class="box">
    <div id="result">
        <p style="color: #888;">Ready for action...</p>
    </div>
</div>

<button id="triggerBet" class="btn">🎰 Place Bet</button>

<div class="rewards-container">
    <h3>🏆 Recent Winners Log (All Pools)</h3>
    <ul id="rewardsList" class="rewards-list">
        <li id="noRewardsPlaceholder" class="no-rewards">No jackpot payouts recorded in the system yet.</li>
    </ul>
</div>

<script>
    const fallbackTabUserId = "USER-UI-" + Math.random().toString(36).substring(2, 8).toUpperCase();

    const usernameInput = document.getElementById('usernameInput');
    const jackpotSelect = document.getElementById('jackpotSelect');

    // In-memory map to store jackpotId -> jackpotName mapping
    let jackpotMap = {};

    const savedName = localStorage.getItem('jackpot_demo_username');
    if (savedName) {
        usernameInput.value = savedName;
    }

    usernameInput.addEventListener('input', (e) => {
        const value = e.target.value.trim();
        if (value) {
            localStorage.setItem('jackpot_demo_username', value);
        } else {
            localStorage.removeItem('jackpot_demo_username');
        }
    });

    function getActiveUserId() {
        const customName = usernameInput.value.trim();
        return customName ? customName : fallbackTabUserId;
    }

    // Dynamic fetch to initialize and refresh the selection dropdown options
    async function loadJackpotPools() {
        try {
            const response = await fetch('/api/v1/bets/pools');
            if (!response.ok) return;

            const pools = await response.json();
            const currentSelection = jackpotSelect.value;

            jackpotSelect.innerHTML = '';
            jackpotMap = {}; // Reset map

            pools.forEach(pool => {
                // Populate the mapping dictionary
                jackpotMap[pool.jackpotId] = pool.name;

                const option = document.createElement('option');
                option.value = pool.jackpotId;
                option.textContent = `${pool.name} ($${pool.currentBalance.toFixed(2)})`;
                if (pool.jackpotId === currentSelection) {
                    option.selected = true;
                }
                jackpotSelect.appendChild(option);
            });
        } catch (error) {
            console.error("Failed to load available jackpot options:", error);
        }
    }

    async function loadDatabaseRewards() {
        try {
            const response = await fetch('/api/v1/bets/rewards');
            if (!response.ok) return;

            const rewards = await response.json();
            const rewardsList = document.getElementById('rewardsList');
            rewardsList.innerHTML = '';

            if (rewards.length === 0) {
                rewardsList.innerHTML = '<li id="noRewardsPlaceholder" class="no-rewards">No jackpot payouts recorded in the system yet.</li>';
                return;
            }

            rewards.forEach(reward => {
                let dateStr = "Recent";
                if (reward.createdAtDate) {
                    const d = new Date(reward.createdAtDate);
                    if (!isNaN(d)) dateStr = d.toLocaleTimeString();
                }

                // Resolve readable name from the map, fallback to ID if it's not loaded yet
                const friendlyJackpotName = jackpotMap[reward.jackpotId] || reward.jackpotId;

                const li = document.createElement('li');
                li.className = 'reward-item';
                li.innerHTML = `
                    <div class="reward-meta">
                        <strong>User: ${reward.userId}</strong>
                        <span class="badge">${friendlyJackpotName}</span><br>
                        <small style="color: #777;">${reward.betId} | Time: ${dateStr}</small>
                    </div>
                    <div class="reward-amount">+$${reward.jackpotRewardAmount.toFixed(2)}</div>
                `;
                rewardsList.appendChild(li);
            });
        } catch (error) {
            console.error("Failed to load historical payout records:", error);
        }
    }

    async function triggerWager() {
        const selectedJackpotId = jackpotSelect.value;
        if (!selectedJackpotId) {
            alert("Please wait until jackpot records finish loading from the server.");
            return;
        }

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '<p style="color: #888;">Processing wager...</p>';

        const mockBetId = "BETID-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        const randomStake = (Math.random() * (200.0 - 100.0) + 100.0).toFixed(2);
        const currentUserId = getActiveUserId();
        const selectedJackpotName = jackpotMap[selectedJackpotId] || selectedJackpotId;

        const payload = {
            betId: mockBetId,
            jackpotId: selectedJackpotId,
            userId: currentUserId,
            betAmount: parseFloat(randomStake)
        };

        try {
            // 1. Submit bet to ingestion pipeline
            await fetch('/api/v1/bets/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            await new Promise(resolve => setTimeout(resolve, 50));

            // 2. Poll evaluate endpoint
            const maxRetries = 5;
            let attempt = 0;
            let delay = 30;
            let evaluateResponse;
            let resultJson;

            while (attempt < maxRetries) {
                evaluateResponse = await fetch('/api/v1/bets/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (evaluateResponse.ok) {
                    resultJson = await evaluateResponse.json();
                    break;
                }

                if (evaluateResponse.status === 409) {
                    attempt++;
                    if (attempt >= maxRetries) break;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 1.5;
                } else {
                    throw new Error(`Server returned unexpected code: ${evaluateResponse.status}`);
                }
            }

            if (!evaluateResponse.ok) {
                throw new Error("Bet propagation timed out.");
            }

            // 3. Render UI layout updates
            if (resultJson.won) {
                resultDiv.innerHTML = `
                <div class='win'>🎉 YOU WON THE JACKPOT!</div>
                <div class='stats'>
                    Target: <strong>${selectedJackpotName}</strong><br>
                    Payout Amount: $${resultJson.payoutAmount.toFixed(2)}<br>
                    <small style="color:#555">Winner: ${currentUserId}</small>
                </div>`;
            } else {
                resultDiv.innerHTML = `
                <div class='lose'>❌ Better luck next time!</div>
                <div class='stats'>
                    Target: <strong>${selectedJackpotName}</strong><br>
                    Stake: $${parseFloat(randomStake).toFixed(2)}<br>
                    Pool Balance: $${resultJson.remainingPoolBalance.toFixed(2)}<br>
                    <small style="color:#555">Player: ${currentUserId}</small>
                </div>`;
            }

            // Refresh UI components synchronously following updates
            await Promise.all([loadJackpotPools(), loadDatabaseRewards()]);

        } catch (error) {
            resultDiv.innerHTML = `<div class='lose' style='color: #ffa726;'>⚠️ Error: ${error.message}</div>`;
        }
    }

    // Event hooks
    document.getElementById('triggerBet').addEventListener('click', triggerWager);

    document.body.addEventListener('keyup', function(event) {
        if (event.key === ' ' && event.target.tagName !== 'INPUT') {
            triggerWager();
        }
    });

    // Synchronize both dropdown options and historical feeds on load/refocus
    async function refreshDashboardState() {
        // We look up pools first to build our id -> name map before rendering rewards
        await loadJackpotPools();
        await loadDatabaseRewards();
    }

    window.addEventListener('focus', refreshDashboardState);
    refreshDashboardState();
</script>

</body>
</html>
